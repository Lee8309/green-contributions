name: Fill History (Daily Auto + Manual Batch)

on:
  schedule:
- cron: '0 20 * * *' # 每天 UTC 20:00（北京时间 4:00）
  workflow_dispatch:
    inputs:
      start_date:
description: '开始日期 (YYYY-MM-DD)'
要求：属实
default: '2025-04-23'
      end_date:
description: '结束日期 (YYYY-MM-DD) - 留空则默认为今天'
要求：假
默认：'
      daily_commits:
        description: '每天提交次数 (用于历史填充)'
要求：属实
default: '12'

jobs:
  fill:
